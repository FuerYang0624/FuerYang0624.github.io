# Custom theme: Modern academic blue
# https://docs.hugoblox.com

hugoblox:
  meta:
    format: "hugoblox-theme@1"
    name: "Academic Ocean"
    vendor: "custom"
    version: "2.0.0"
    license: "MIT"
    description: "Clean academic palette — deep blue, pure white, subtle accents"

  type: "dual"

  light:
    colors:
      primary: "#1e3a5f"
      secondary: "#2563eb"
      neutral: "slate"
    surfaces:
      background: "#ffffff"
      foreground: "#1e293b"
      header:
        background: "transparent"
        foreground: "#1e3a5f"
      footer:
        background: "#f8fafc"
        foreground: "#475569"

  dark:
    colors:
      primary: "#93c5fd"
      secondary: "#60a5fa"
      neutral: "slate"
    surfaces:
      background: "#0f172a"
      foreground: "#f1f5f9"
      header:
        background: "transparent"
        foreground: "#f8fafc"
      footer:
        background: "#111827"
        foreground: "#e2e8f0"
