bio: |
  I am a Ph.D. student in geophysics at **Southern University of Science and Technology (SUSTech)**, studying crustal deformation and earthquake mechanics through satellite geodesy, field geology, and computational modeling.

  My research focuses on **InSAR time-series analysis**, **fault slip inversion**, and **active tectonics** in seismically active regions. I aim to build reproducible workflows that connect observations to physical mechanisms.

  Prior to my Ph.D., I received my **M.Sc. in Geology** from Sun Yat-sen University (2025) and **B.Sc. in Geology** from Lanzhou University (2022).

  我是南方科技大学地球物理学博士生，研究方向为 InSAR 时序分析、地壳形变与活动构造。本网站记录论文、项目与公开学习笔记，欢迎交流合作。

