bio: |
  I study crustal deformation and earthquake mechanics through satellite geodesy, field geology, and computational modeling.
  My work focuses on InSAR time-series analysis, fault slip inversion, and active tectonics in seismically active regions.
  This site is my long-term academic home: a record of publications, research projects, and a public notebook where I share
  learning notes, research workflows, and reflections on the science of understanding the solid Earth.

