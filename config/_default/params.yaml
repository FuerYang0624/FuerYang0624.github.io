# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding (for people/profiles, use the author system in content/authors/)
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    # Site name - shown in navbar, footer, copyright, and browser title by default
    name: "Fuer Yang"
    # Legal entity for copyright notices (defaults to name if not set)
    organization: "Southern University of Science and Technology (SUSTech)"
    # Schema.org type for structured data
    type: person                        # person | organization | local_business
    # Short tagline displayed on your site
    tagline: "Geophysics · InSAR · Active Tectonics"
    # Site meta description for search engines and social sharing
    description: "Ph.D. student in geophysics at SUSTech. Research on InSAR time-series analysis, crustal deformation, fault slip inversion, and reproducible geoscience."
    # Social accounts (used for meta tags like Twitter Cards)
    social:
      twitter: ""                       # Twitter/X handle for Twitter Cards (without @)

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: system
    pack: "academic-ocean"
    colors:
      primary: "#1A2B4A"
      secondary: "#3B82F6"
      neutral: "slate"
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: "#FAFAF8"
      foreground: "#1F2937"
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    font: "serif"
    size: "md"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # Border radius: 'none', 'sm', 'md', 'lg', or 'full'
    radius: "lg"
    spacing: "comfortable"
    # Avatar shape in author profiles
    avatar_shape: circle                # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    # Header style variant
    style: navbar                       # navbar | navbar-simple | minimal
    # Stick to top on scroll
    sticky: true
    # Menu alignment
    align: center                       # left | center | right
    # Feature toggles
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    # Call-to-action button
    cta:
      enable: true
      text: "Download CV"
      url: "/uploads/resume.pdf"

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Site footer
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    # Footer style variant
    style: minimal                      # minimal | columns | centered
    language_switcher: false
    # Custom footer text (HTML supported)
    text: "Built as a living academic portfolio. Please cite or link original sources when reusing public notes."

  # ────────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # Legal notices and licensing
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    # Copyright notice - supports {year}, {name}, {license} placeholders
    notice: "© {year} {name}. Unless otherwise noted, content is shared for academic communication."
    license:
      type: cc                          # cc | custom
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO
  # Search engine optimization - overrides and technical settings
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    # Browser tab title override (defaults to identity.name if not set)
    title: ""
    # For local_business identity type only
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    # AI/LLM crawler guidance (llms.txt)
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers - customize to match your public content."
      contact: "mailto:yangfe0624@gmail.com"

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    # Math rendering
    math:
      enable: false
    # Table of contents
    toc:
      enable: true
    # Reading time estimates
    reading_time:
      enable: true
    # Academic citations
    citations:
      style: apa                        # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    # Trending/suggested search terms
    suggestions:
      - InSAR
      - crustal deformation
      - fault slip
      - geophysics
    quick_actions:
      - name: Publications
        url: /publications/
      - name: Research
        url: /research/
      - name: Blog
        url: /blog/
      - name: Contact
        url: /contact/

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: ""                        # giscus | disqus
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: ""                # Google Analytics 4: G-XXXXXXXXXX
    google_tag_manager:
      container_id: ""                  # GTM-XXXXXXX
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: ""                             # e.g., https://github.com/username/repo
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"          # Go time format
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies (requires Netlify integration)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: sameorigin           # deny | sameorigin | allow - sameorigin allows slides embedding
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging (hidden in production)
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left             # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PRO
  # Pro subscription features and affiliate program
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Hide "Powered by HugoBlox" attribution
    # Requires: Pro subscription to support HugoBlox via alternative means
    # Note: Even with Pro, you can keep this false to support open source!
    # Get Pro: https://hugoblox.com/pro
    hide_attribution: false
    
    # Affiliate referral code for rewards program
    # Join affiliate program: https://hugoblox.com/affiliates
    affiliate_code: ""
